name: Release Arch Package

on:
  push:
    tags:
      - 'v*'

jobs:
  build-package:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install system build essentials
        run: |
          pacman -Syu --noconfirm --needed base-devel git sudo

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Arch Package
        run: |
          # makepkg cannot be run as root. We must create a builder user.
          useradd -m builder
          # Give builder passwordless sudo privileges
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          # Set correct permissions so builder can read/write the workspace
          chown -R builder:builder .
          # Build the package as the builder user
          sudo -u builder makepkg --noconfirm -s
          
      - name: Upload Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          path: "*.pkg.tar.zst"

  publish-release:
    needs: build-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Built Package
        uses: actions/download-artifact@v4
        with:
          name: arch-package

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.pkg.tar.zst
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
